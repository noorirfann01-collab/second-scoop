<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Second Scoop</title>
<meta name="description" content="Shop Second Scoop cookies, edible dough and limited drops. Pakistan & Toronto storefronts.">
<link rel="icon" href="assets/img/logo-mark.svg">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="ss-announcement"></div>
<div id="ss-header-slot"></div>

<div class="ss-page-head">
  <div class="wrap">
    <span class="eyebrow" id="shop-eyebrow">Storefront</span>
    <h2 id="shop-title">Shop</h2>
    <p id="shop-sub"></p>
  </div>
</div>

<section class="ss-sec" style="padding-top:32px">
  <div class="wrap">
    <div class="ss-shop-toolbar">
      <div class="ss-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="shop-search" placeholder="Search scoops…" aria-label="Search products">
      </div>
      <div class="ss-filters" id="shop-filters"></div>
    </div>
    <div class="ss-grid" id="shop-grid"></div>
    <div class="ss-empty" id="shop-empty" style="display:none">No scoops match that. Try another search. 🍪</div>
  </div>
</section>

<div id="ss-footer-slot"></div>

<script src="assets/js/config/settings.js"></script>
<script src="assets/js/config/regions.js"></script>
<script src="assets/js/config/products.js"></script>
<script src="assets/js/config/vault.js"></script>
<script src="assets/js/config/content.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/pages/shop.js"></script>
</body>
</html>
