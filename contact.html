<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Second Scoop</title>
<meta name="description" content="Get in touch with Second Scoop — Pakistan & Toronto.">
<link rel="icon" href="assets/img/logo-mark.svg">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div id="ss-announcement"></div>
<div id="ss-header-slot"></div>

<div class="ss-page-head">
  <div class="wrap"><span class="eyebrow" data-edit="pages.contact.eyebrow">Say Hello</span><h2 data-edit="pages.contact.title">Contact</h2>
  <p data-edit="pages.contact.intro">Orders, collabs, wholesale or just to tell us the OG Scoopie changed your life.</p></div>
</div>

<section class="ss-sec">
  <div class="wrap" style="display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start" id="contact-cols">
    <div class="ss-form-card">
      <h3 data-edit="pages.contact.formTitle">Send a message</h3>
      <form id="contact-form">
        <div style="margin-bottom:14px"><label class="ss-label" data-edit="pages.contact.nameLabel">Name</label><input class="ss-field" name="name" required></div>
        <div style="margin-bottom:14px"><label class="ss-label" data-edit="pages.contact.emailLabel">Email</label><input class="ss-field" type="email" name="email" required></div>
        <div style="margin-bottom:14px"><label class="ss-label" data-edit="pages.contact.messageLabel">Message</label><textarea class="ss-field" name="message" required></textarea></div>
        <button class="ss-btn ss-btn--block" type="submit" data-edit="pages.contact.sendButton">Send</button>
        <p id="contact-msg" style="color:var(--ok);font-weight:700;margin-top:.8em;min-height:1.2em"></p>
      </form>
    </div>
    <div>
      <div class="ss-form-card" id="contact-info"></div>
      <div class="ss-form-card">
        <h3 data-edit="pages.contact.followTitle">Follow the drops</h3>
        <p style="color:var(--ink-60)" data-edit="pages.contact.followText">New flavours, restocks and Vault codes land on Instagram first.</p>
        <a class="ss-btn ss-btn--blush" id="contact-ig" href="https://instagram.com/secondscoopco" target="_blank" rel="noopener">@secondscoopco</a>
      </div>
    </div>
  </div>
</section>

<div id="ss-footer-slot"></div>

<script src="assets/js/config/settings.js"></script>
<script src="assets/js/config/regions.js"></script>
<script src="assets/js/config/products.js"></script>
<script src="assets/js/config/vault.js"></script>
<script src="assets/js/config/content.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/app.js"></script>
<script>
  SSApp.mount({recentlySold:false});
  (function(){
    var r = SS.region();
    document.getElementById("contact-info").innerHTML =
      "<h3>"+r.flag+" "+r.name+"</h3>"+
      "<p style='color:var(--ink-60)'><strong>WhatsApp:</strong> "+r.contact.whatsapp+"<br>"+
      "<strong>Email:</strong> "+r.contact.email+"<br>"+
      "<strong>Pickup:</strong> "+r.pickup.address+" ("+r.pickup.hours+")<br>"+
      "<strong>Delivery:</strong> "+r.delivery.cities.join(", ")+"</p>"+
      "<p style='font-size:.82rem;color:var(--ink-40)'>Switch region at the top to see our other storefront.</p>";
    var f = document.getElementById("contact-form");
    f.addEventListener("submit", function(e){
      e.preventDefault();
      SS.addSignup({name:f.name.value, email:f.email.value, message:f.message.value, source:"contact"});
      f.reset();
      document.getElementById("contact-msg").textContent = "Thanks! We'll be in touch soon. 🍪";
    });
  })();
</script>
</body>
</html>
